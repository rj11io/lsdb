name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm test

      - name: Verify npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami --registry=https://registry.npmjs.org/

      - name: Release to npm and GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run semantic-release

      - name: Read package scope
        id: package
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name || ''")"
          case "$PACKAGE_NAME" in
            @*/*)
              PACKAGE_SCOPE="$(printf '%s' "${PACKAGE_NAME#@}" | cut -d/ -f1)"
              echo "scope=$PACKAGE_SCOPE" >> "$GITHUB_OUTPUT"
              echo "name=${PACKAGE_NAME#*/}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Configure GitHub Packages auth
        if: steps.package.outputs.scope != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@${{ steps.package.outputs.scope }}'

      - name: Resolve tarball path
        id: tarball
        if: steps.package.outputs.scope != ''
        run: |
          TARBALL_PATH="$(find dist -maxdepth 1 -name '*.tgz' | head -n 1)"
          if [ -n "$TARBALL_PATH" ]; then
            echo "path=./${TARBALL_PATH#./}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish tarball to GitHub Packages
        if: steps.tarball.outputs.path != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish ${{ steps.tarball.outputs.path }} --registry=https://npm.pkg.github.com
